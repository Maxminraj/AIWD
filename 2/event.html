<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Football Club - Player Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>⚽ FOOTBALL CLUB REGISTRATION</h1>
    <p>"Rise, Train, Conquer - Join Our Championship"</p>
</header>

<div class="banner">
    <svg width="100%" height="300" style="background:linear-gradient(135deg,#e94560,#ff6b6b);">
        <text x="50%" y="50%" text-anchor="middle" dy=".3em" font-size="48" font-weight="bold" fill="white" font-family="Arial">FOOTBALL CLUB</text>
        <text x="50%" y="60%" text-anchor="middle" dy=".3em" font-size="24" fill="white" font-family="Arial">Championship 2026</text>
        <circle cx="20%" cy="30%" r="60" fill="none" stroke="white" stroke-width="3"/>
        <circle cx="80%" cy="70%" r="50" fill="none" stroke="white" stroke-width="3"/>
    </svg>
</div>

<main>
    <section>
        <h2>Media Showcase</h2>

        <h3>Championship Highlights Video</h3>
        <div class="media-box">
            <!-- your own video file -->
            <video controls width="100%">
                <source src="highlights.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <h3>Club Anthem</h3>
        <div class="media-box">
            <!-- your own audio file -->
            <audio controls style="width:100%;">
                <source src="anthem.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <small class="note">Listen to our official club anthem</small>
        </div>
    </section>

    <section class="form-section">
        <h2>Player Registration Form</h2>
        <form>
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-row">
                <div>
                    <label for="dob">Date of Birth *</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
                <div>
                    <label for="position">Position *</label>
                    <select id="position" name="position" required>
                        <option value="">Select Position</option>
                        <option value="goalkeeper">Goalkeeper</option>
                        <option value="defender">Defender</option>
                        <option value="midfielder">Midfielder</option>
                        <option value="forward">Forward</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Experience Level *</label>
                <div class="radio-group">
                    <label><input type="radio" name="experience" value="beginner" required> Beginner</label>
                    <label><input type="radio" name="experience" value="intermediate"> Intermediate</label>
                    <label><input type="radio" name="experience" value="professional"> Professional</label>
                </div>
            </div>

            <div class="form-group">
                <label for="skills">Skills & Achievements</label>
                <textarea id="skills" name="skills" placeholder="Describe your strengths, previous clubs, achievements..."></textarea>
            </div>

            <div class="form-group">
                <label for="file">Upload Certificate/CV</label>
                <input type="file" id="file" name="file" accept=".pdf,.doc,.jpg,.png">
            </div>

            <button type="submit" class="btn">Register Now</button>
        </form>
    </section>
</main>

<footer>&copy; 2024 Football Club Registration Portal - Experiment 2: CSS3 & Flexbox</footer>

</body>
</html>
